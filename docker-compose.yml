version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ranjhanaa
      MYSQL_DATABASE: railway_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  railway-app:
    build: .
    container_name: railway-app
    depends_on:
      - mysql

    ports:
      - "8085:8085"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/railway_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ranjhanaa

volumes:
  mysql_data: